<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Rush</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: rgba(0,0,0,0.07);
    --text: #1A1814;
    --text2: #6B6760;
    --text3: #A09C96;
    --correct: #2D9E6B;
    --correct-bg: #EAF7F1;
    --wrong: #E24B4A;
    --wrong-bg: #FEF0F0;
    --close: #D4900A;
    --close-bg: #FEF5E4;
    --accent: #5B4FCF;
    --accent-light: #EEEDFE;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; max-width: 560px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ── HOME ── */
  #home {
    justify-content: center;
    min-height: 100vh;
    gap: 0;
    padding: 2rem 0;
  }

  .logo {
    font-family: 'Nunito', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.03em;
    margin-bottom: 0.2rem;
    text-align: center;
  }

  .logo span { color: var(--accent); }

  .tagline {
    font-size: 0.95rem;
    color: var(--text2);
    text-align: center;
    margin-bottom: 2.5rem;
    font-weight: 500;
  }

  .home-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 2rem;
    width: 100%;
    margin-bottom: 1rem;
  }

  .home-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-pill {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 0.9rem 0.75rem;
    text-align: center;
  }

  .stat-pill .num {
    font-family: 'Nunito', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    display: block;
  }

  .stat-pill .lbl {
    font-size: 0.72rem;
    color: var(--text3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 4px;
    display: block;
  }

  .username-wrap {
    margin-bottom: 1.25rem;
  }

  .field-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 0.4rem;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .username-input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Nunito Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    background: var(--surface2);
    outline: none;
    transition: border-color 0.2s;
  }

  .username-input:focus { border-color: var(--accent); background: white; }

  .btn-primary {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    letter-spacing: -0.01em;
  }

  .btn-primary:hover { background: #4A3FBF; box-shadow: 0 4px 20px rgba(91,79,207,0.3); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    padding: 0.65rem 1.2rem;
    background: var(--surface);
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-secondary:hover { background: var(--surface2); color: var(--text); }

  /* ── GAME ── */
  #game { gap: 1.25rem; padding-top: 1rem; }

  .game-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0 0.25rem;
  }

  .progress-wrap { flex: 1; margin: 0 1rem; }

  .progress-text {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text3);
    text-align: center;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .progress-bar {
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .timer-display {
    font-family: 'Nunito', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--text);
    min-width: 70px;
    text-align: right;
    letter-spacing: -0.02em;
  }

  .quit-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
  }

  .quit-btn:hover { color: var(--wrong); background: var(--wrong-bg); }

  /* flag card */
  .flag-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    width: 100%;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    transition: transform 0.15s;
    min-height: 340px;
  }

  .flag-img-wrap {
    height: 140px;
    width: auto;
    max-width: 100%;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.12);
    flex-shrink: 0;
    line-height: 0;
  }

  .flag-img-wrap img {
    height: 140px;
    width: auto;
    max-width: 100%;
    display: block;
    transition: opacity 0.2s;
  }

  .flag-img-wrap img.flag-tall {
    height: 140px;
    width: auto;
  }

  /* input area */
  .input-wrap { width: 100%; position: relative; }

  .answer-input {
    width: 100%;
    padding: 0.85rem 1.1rem;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    background: var(--surface2);
    outline: none;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    text-align: center;
    letter-spacing: 0.01em;
  }

  .answer-input:focus { background: white; border-color: var(--accent); }
  .answer-input.state-correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); }
  .answer-input.state-wrong { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
  .answer-input.state-close { border-color: var(--close); background: var(--close-bg); color: var(--close); }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .answer-input.shake { animation: shake 0.35s ease; }

  .feedback-label {
    text-align: center;
    font-size: 0.82rem;
    font-weight: 600;
    margin-top: 0.5rem;
    min-height: 1.2rem;
    transition: color 0.2s;
  }

  .feedback-label.correct { color: var(--correct); }
  .feedback-label.wrong { color: var(--wrong); }
  .feedback-label.close { color: var(--close); }

  /* skip */
  .skip-row {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
  }

  /* ── RESULTS ── */
  #results { gap: 1.25rem; padding-top: 1.5rem; }

  .results-header { text-align: center; }

  .results-title {
    font-family: 'Nunito', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  .results-subtitle {
    font-size: 0.9rem;
    color: var(--text2);
    font-weight: 500;
  }

  .final-time-card {
    background: var(--accent);
    border-radius: var(--radius);
    padding: 1.75rem;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(91,79,207,0.25);
  }

  .final-time-label {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.7);
    margin-bottom: 0.4rem;
  }

  .final-time-value {
    font-family: 'Nunito', sans-serif;
    font-size: 3.5rem;
    font-weight: 800;
    color: white;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .final-time-sub {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.65);
    margin-top: 0.5rem;
    font-weight: 500;
  }

  .results-stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    width: 100%;
  }

  .results-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1rem;
    text-align: center;
  }

  .results-stat .num {
    font-family: 'Nunito', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  .results-stat .lbl {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .results-stat.green .num { color: var(--correct); }
  .results-stat.red .num { color: var(--wrong); }
  .results-stat.amber .num { color: var(--close); }
  .results-stat.purple .num { color: var(--accent); }

  /* leaderboard */
  .section-title {
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    color: var(--text);
    width: 100%;
    margin-bottom: -0.25rem;
    letter-spacing: -0.01em;
  }

  .leaderboard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    overflow: hidden;
  }

  .lb-row {
    display: flex;
    align-items: center;
    padding: 0.85rem 1.25rem;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .lb-row:last-child { border-bottom: none; }
  .lb-row.highlight { background: var(--accent-light); }

  .lb-rank {
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--text3);
    min-width: 24px;
    text-align: center;
  }

  .lb-rank.gold { color: #D4900A; }
  .lb-rank.silver { color: #888; }
  .lb-rank.bronze { color: #A0522D; }

  .lb-name {
    flex: 1;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
  }

  .lb-time {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .lb-empty {
    padding: 2rem;
    text-align: center;
    color: var(--text3);
    font-size: 0.9rem;
    font-weight: 500;
  }

  /* recent runs */
  .run-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .run-row:last-child { border-bottom: none; }

  .run-date {
    font-size: 0.82rem;
    color: var(--text3);
    font-weight: 500;
  }

  .run-time {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .run-flags {
    font-size: 0.78rem;
    color: var(--text3);
    font-weight: 500;
  }

  .results-actions {
    display: flex;
    gap: 0.75rem;
    width: 100%;
  }

  .results-actions .btn-primary { flex: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .logo { font-size: 2rem; }
    .flag-card { padding: 1.25rem; }
    .flag-img-wrap { max-width: 260px; }
    .final-time-value { font-size: 2.8rem; }
    .home-stats { gap: 0.6rem; }
  }

  /* flag transition */
  @keyframes flagIn {
    from { opacity: 0; transform: scale(0.96) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .flag-img-wrap.entering { animation: flagIn 0.3s ease forwards; }

  /* correct flash */
  @keyframes correctFlash {
    0% { transform: scale(1); }
    40% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }

  .flag-img-wrap.correct-flash { animation: correctFlash 0.3s ease; }

  .badge-new-best {
    background: var(--accent);
    color: white;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: inline-block;
    margin-left: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<!-- ── HOME ── -->
<div id="home" class="screen active">
  <div style="width:100%; max-width:560px; display:flex; flex-direction:column; align-items:center; gap:0; padding: 2rem 0;">
    <div class="logo">Flag<span>Rush</span></div>
    <div class="tagline">How fast can you name every UN flag?</div>

    <div class="home-card">
      <div class="home-stats">
        <div class="stat-pill">
          <span class="num">193</span>
          <span class="lbl">Flags</span>
        </div>
        <div class="stat-pill">
          <span class="num" id="home-best">—</span>
          <span class="lbl">Your best</span>
        </div>
        <div class="stat-pill">
          <span class="num" id="home-runs">0</span>
          <span class="lbl">Runs</span>
        </div>
      </div>

      <div class="username-wrap">
        <span class="field-label">Your name</span>
        <input class="username-input" id="username-input" type="text" placeholder="Enter a display name" maxlength="20" autocomplete="off" />
      </div>

      <button class="btn-primary" onclick="startGame()">Start game →</button>
    </div>

    <div id="home-leaderboard-section" style="width:100%;">
      <p class="section-title" style="margin-bottom:0.6rem; padding: 0 0.1rem;">All-time leaderboard</p>
      <div class="leaderboard" id="home-leaderboard">
        <div class="lb-empty">No scores yet — be the first!</div>
      </div>
    </div>
  </div>
</div>

<!-- ── GAME ── -->
<div id="game" class="screen">
  <div class="game-topbar">
    <button class="quit-btn" onclick="confirmQuit()" title="Quit">✕</button>
    <div class="progress-wrap">
      <div class="progress-text" id="progress-text">1 / 193</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="timer-display" id="timer-display">0:00</div>
  </div>

  <div class="flag-card" id="flag-card">
    <div class="flag-img-wrap">
      <img id="flag-img" src="" alt="Flag" />
    </div>
    <div class="input-wrap">
      <input
        class="answer-input"
        id="answer-input"
        type="text"
        placeholder="Type country name…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <div class="feedback-label" id="feedback-label"></div>
    </div>
  </div>

  <div class="skip-row">
    <button class="btn-primary" onclick="submitAnswer()" id="submit-btn">Submit ↵</button>
  </div>
  <div class="skip-row" style="margin-top:-0.5rem;">
    <button class="btn-secondary" onclick="revealFlag()">Reveal 👁</button>
    <button class="btn-secondary" onclick="skipFlag()">Skip</button>
  </div>
</div>

<!-- ── RESULTS ── -->
<div id="results" class="screen">
  <div class="results-header">
    <div class="results-title" id="results-title">Run complete!</div>
    <div class="results-subtitle" id="results-subtitle"></div>
  </div>

  <div class="final-time-card">
    <div class="final-time-label">Final time</div>
    <div class="final-time-value" id="final-time">0:00</div>
    <div class="final-time-sub" id="final-time-sub"></div>
  </div>

  <div class="results-stats-grid">
    <div class="results-stat green">
      <span class="num" id="stat-correct">0</span>
      <span class="lbl">Correct</span>
    </div>
    <div class="results-stat red">
      <span class="num" id="stat-skipped">0</span>
      <span class="lbl">Skipped</span>
    </div>
    <div class="results-stat amber">
      <span class="num" id="stat-close">0</span>
      <span class="lbl">Close calls</span>
    </div>
    <div class="results-stat purple">
      <span class="num" id="stat-avg">0s</span>
      <span class="lbl">Avg per flag</span>
    </div>
  </div>

  <div style="width:100%;">
    <p class="section-title" style="margin-bottom:0.6rem;">All-time leaderboard</p>
    <div class="leaderboard" id="results-leaderboard"></div>
  </div>

  <div style="width:100%;">
    <p class="section-title" style="margin-bottom:0.6rem;">Your recent runs</p>
    <div class="leaderboard" id="recent-runs"></div>
  </div>

  <div class="results-actions">
    <button class="btn-secondary" onclick="showScreen('home')">Home</button>
    <button class="btn-primary" onclick="startGame()">Play again →</button>
  </div>
</div>

// ── STATE ──
let shuffled = [];

let currentUser = '';
let feedbackTimeout = null;
let inputLocked = false;

// ── STORAGE ──
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem('flagrush_lb') || '[]'); } catch { return []; }
}

function saveLeaderboard(lb) {
  localStorage.setItem('flagrush_lb', JSON.stringify(lb));
}

function getRecentRuns() {
  try { return JSON.parse(localStorage.getItem('flagrush_runs') || '[]'); } catch { return []; }
}

  localStorage.setItem('flagrush_runs', JSON.stringify(runs));

  return localStorage.getItem('flagrush_user') || '';
}

// ── UTILS ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return min + ':' + String(sec).padStart(2, '0');
}

function formatTimeMs(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  const centisec = Math.floor((ms % 1000) / 10);
  return min + ':' + String(sec).padStart(2, '0') + '.' + String(centisec).padStart(2, '0');
}

function normalise(str) {
  return str
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9 ]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => [i]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

// Known single-token abbreviations that are always acceptable
const ABBREVS = new Set(['usa','us','uk','uae','png','drc','car','ksa','rsa','roc','dprk','fsm','nz','eu']);

function isAbbreviation(norm) {
  // An abbreviation is all caps originally, or a known short form with no spaces
  return !norm.includes(' ') && norm.length <= 4;
}

function checkAnswer(input, flag) {
  const norm = normalise(input);
  if (!norm) return 'empty';

  const targets = [flag.name, ...flag.alt].map(normalise);

  // exact match on name or known alt
  if (targets.includes(norm)) return 'correct';

  // block multi-word abbreviations: if input has no spaces but target has spaces,
  // only accept if it's in the known abbreviations list
  const primaryNorm = normalise(flag.name);
  const targetHasSpaces = primaryNorm.includes(' ');
  if (targetHasSpaces && !norm.includes(' ') && !ABBREVS.has(norm)) {
    // single word typed for a multi-word country — check alts first
    const altMatch = flag.alt.map(normalise).includes(norm);
    if (!altMatch) {
      // not a known alt, not a known abbrev — treat as wrong, no close
      return 'wrong';
    }
  }

  // prefix match: typed at least 60% of target from the start
  for (const t of targets) {
    if (t.startsWith(norm) && norm.length >= Math.max(4, Math.ceil(t.length * 0.6))) return 'close';
  }

  // fuzzy match: input length within 2 of target, max 2 edits (1 for short words)
  for (const t of targets) {
    const lenDiff = Math.abs(norm.length - t.length);
    if (lenDiff > 2) continue;
    const dist = levenshtein(norm, t);
    const threshold = norm.length <= 5 ? 1 : 2;
    if (dist <= threshold) return 'close';
  }

  return 'wrong';
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── HOME ──
function initHome() {
  const saved = getSavedUsername();
  if (saved) document.getElementById('username-input').value = saved;

  const lb = getLeaderboard();
  const runs = getRecentRuns();

  document.getElementById('home-runs').textContent = runs.length;

  if (runs.length > 0) {
    const best = runs.reduce((a, b) => a.timeMs < b.timeMs ? a : b);
    document.getElementById('home-best').textContent = formatTime(best.timeMs);
  } else {
    document.getElementById('home-best').textContent = '—';
  }

  renderLeaderboard('home-leaderboard', lb, null);
}

function renderLeaderboard(elId, lb, highlightUser) {
  const el = document.getElementById(elId);
  if (!lb || lb.length === 0) {
    el.innerHTML = '<div class="lb-empty">No scores yet — be the first!</div>';
    return;
  }

  const sorted = [...lb].sort((a, b) => a.timeMs - b.timeMs).slice(0, 10);
  el.innerHTML = sorted.map((entry, i) => {
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1);
    const hl = highlightUser && entry.name === highlightUser ? ' highlight' : '';
    return `<div class="lb-row${hl}">
      <span class="lb-rank ${rankClass}">${medal}</span>
      <span class="lb-name">${entry.name}</span>
      <span class="lb-time">${formatTimeMs(entry.timeMs)}</span>
    </div>`;
  }).join('');
}

// ── GAME ──
function startGame() {
  const nameInput = document.getElementById('username-input');
  currentUser = (nameInput.value || 'Anonymous').trim().slice(0, 20);
  saveUsername(currentUser);

  shuffled = shuffle(FLAGS);
  currentIndex = 0;
  correctCount = 0;
  skippedCount = 0;
  closeCount = 0;
  revealedCount = 0;
  splitTimes = [];
  elapsedMs = 0;
  inputLocked = false;

  showScreen('game');
  showFlag();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  startTime = Date.now() - elapsedMs;
  timerInterval = setInterval(() => {
    elapsedMs = Date.now() - startTime;
    document.getElementById('timer-display').textContent = formatTime(elapsedMs);
  }, 100);
}

function showFlag() {
  if (currentIndex >= shuffled.length) {
    endGame();
    return;
  }

  const flag = shuffled[currentIndex];
  const img = document.getElementById('flag-img');
  img.src = `https://flagcdn.com/w320/${flag.code}.png`;
  img.alt = 'Flag';
  // Nepal (np) has a unique pennon shape — use contain so it doesn't get cropped
  if (flag.code === 'np') {
    img.className = 'flag-tall';
  } else {
    img.className = '';
  }

  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = 'answer-input';
  inputLocked = false;

  document.getElementById('feedback-label').textContent = '';
  document.getElementById('feedback-label').className = 'feedback-label';

  const pct = (currentIndex / shuffled.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = (currentIndex + 1) + ' / ' + shuffled.length;

  const card = document.getElementById('flag-card');
  const flagWrap = card.querySelector('.flag-img-wrap');
  flagWrap.classList.remove('entering', 'correct-flash');
  void flagWrap.offsetWidth;
  flagWrap.classList.add('entering');

  flagStartTime = Date.now();

  setTimeout(() => input.focus(), 50);
}

let revealedCount = 0;

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('answer-input');

  // typing: clear any stale feedback only, no new feedback shown
  input.addEventListener('input', () => {
    if (inputLocked) return;
    input.classList.remove('state-wrong', 'state-close', 'state-correct', 'shake');
    const fb = document.getElementById('feedback-label');
    fb.textContent = '';
    fb.className = 'feedback-label';
  });

  // Enter: evaluate and show correct / close / wrong feedback
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !inputLocked) {
      submitAnswer();
    }
  });

  initHome();
});

function handleCorrect() {
  if (inputLocked) return;
  inputLocked = true;

  const input = document.getElementById('answer-input');
  input.className = 'answer-input state-correct';

  const fb = document.getElementById('feedback-label');
  fb.textContent = '✓ Correct!';
  fb.className = 'feedback-label correct';

  const card = document.getElementById('flag-card');
  const flagWrap = card.querySelector('.flag-img-wrap');
  flagWrap.classList.add('correct-flash');

  const splitMs = Date.now() - flagStartTime;
  splitTimes.push({ code: shuffled[currentIndex].code, name: shuffled[currentIndex].name, ms: splitMs });
  correctCount++;

  currentIndex++;
  setTimeout(() => {
    showFlag();
    // keep keyboard up on mobile by refocusing immediately
    document.getElementById('answer-input').focus();
  }, 400);
}

function submitAnswer() {
  const input = document.getElementById('answer-input');
  if (inputLocked || !input.value.trim()) return;
  const flag = shuffled[currentIndex];
  const result = checkAnswer(input.value, flag);
  if (result === 'correct') {
    handleCorrect();
  } else if (result === 'close') {
    input.classList.remove('state-wrong', 'state-correct');
    input.classList.add('state-close');
    const fb = document.getElementById('feedback-label');
    fb.textContent = 'Almost… check your spelling';
    fb.className = 'feedback-label close';
    closeCount++;
    clearTimeout(feedbackTimeout);
    feedbackTimeout = setTimeout(() => {
      input.classList.remove('state-close');
      fb.textContent = '';
      fb.className = 'feedback-label';
    }, 1200);
    input.focus();
  } else {
    triggerWrong();
    input.focus();
  }
}

function triggerWrong() {
  const input = document.getElementById('answer-input');
  input.classList.remove('shake');
  void input.offsetWidth;
  input.classList.add('shake', 'state-wrong');

  const fb = document.getElementById('feedback-label');
  fb.textContent = 'Not quite — keep trying';
  fb.className = 'feedback-label wrong';

  clearTimeout(feedbackTimeout);
  feedbackTimeout = setTimeout(() => {
    input.classList.remove('state-wrong');
    input.classList.remove('shake');
    fb.textContent = '';
    fb.className = 'feedback-label';
  }, 600);
}

function skipFlag() {
  if (inputLocked) return;
  skippedCount++;
  splitTimes.push({ code: shuffled[currentIndex].code, name: shuffled[currentIndex].name, ms: null, revealed: false });
  currentIndex++;
  showFlag();
}

function revealFlag() {
  if (inputLocked) return;
  revealedCount++;
  const flag = shuffled[currentIndex];
  const fb = document.getElementById('feedback-label');
  fb.textContent = '👁 ' + flag.name;
  fb.className = 'feedback-label close';
  // after reveal, player must still type it correctly — just now they know the answer
}

function confirmQuit() {
  if (confirm('Quit this run? Your progress will be lost.')) {
    clearInterval(timerInterval);
    showScreen('home');
    initHome();
  }
}

// ── END GAME ──
function endGame() {
  clearInterval(timerInterval);

  const totalMs = elapsedMs;
  const avgMs = correctCount > 0 ? Math.round(totalMs / correctCount) : 0;

  // save to leaderboard
  const lb = getLeaderboard();
  const existingIdx = lb.findIndex(e => e.name === currentUser);
  let isNewBest = false;
  if (existingIdx >= 0) {
    if (totalMs < lb[existingIdx].timeMs) {
      lb[existingIdx].timeMs = totalMs;
      isNewBest = true;
    }
  } else {
    lb.push({ name: currentUser, timeMs: totalMs });
    isNewBest = true;
  }
  saveLeaderboard(lb);

  // save run
  const runs = getRecentRuns();
  runs.unshift({
    timeMs: totalMs,
    correct: correctCount,
    skipped: skippedCount,
    revealed: revealedCount,
    date: new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })
  });
  saveRecentRuns(runs.slice(0, 20));

  // populate results
  document.getElementById('results-title').textContent = 'Run complete, ' + currentUser + '!';
  document.getElementById('results-subtitle').textContent = isNewBest ? '🎉 New personal best!' : 'Keep practicing!';
  document.getElementById('final-time').textContent = formatTimeMs(totalMs);
  document.getElementById('final-time-sub').textContent = correctCount + ' of 193 flags named correctly';

  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-skipped').textContent = skippedCount;
  document.getElementById('stat-close').textContent = closeCount;
  document.getElementById('stat-avg').textContent = (avgMs / 1000).toFixed(1) + 's';

  renderLeaderboard('results-leaderboard', lb, currentUser);

  const runsEl = document.getElementById('recent-runs');
  const recentRuns = getRecentRuns();
  if (recentRuns.length === 0) {
    runsEl.innerHTML = '<div class="lb-empty">No runs yet</div>';
  } else {
    runsEl.innerHTML = recentRuns.slice(0, 8).map(r => {
      const revealTag = r.revealed > 0 ? ` · ${r.revealed} revealed` : '';
      return `<div class="run-row">
        <span class="run-date">${r.date}</span>
        <span class="run-flags">${r.correct}/193 correct${revealTag}</span>
        <span class="run-time">${formatTimeMs(r.timeMs)}</span>
      </div>`;
    }).join('');
  }

  showScreen('results');
}
